<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark circle background -->
  <circle cx="50" cy="50" r="49" fill="#0a0a0a"/>
  <circle cx="50" cy="50" r="49" fill="none" stroke="#c8a84b" stroke-width="0.8" opacity="0.6"/>

  <!-- Speed lines behind the ball -->
  <line x1="10" y1="48" x2="28" y2="53" stroke="#c8a84b" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="8"  y1="54" x2="25" y2="58" stroke="#c8a84b" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
  <line x1="11" y1="42" x2="27" y2="47" stroke="#c8a84b" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <!-- Impact sparks -->
  <line x1="44" y1="51" x2="48" y2="44" stroke="#c8a84b" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="45" y1="52" x2="51" y2="49" stroke="#c8a84b" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="55" x2="49" y2="60" stroke="#c8a84b" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Left stump — knocked far left (flying) -->
  <rect x="49" y="38" width="4.5" height="26" rx="1.2" fill="#c8a84b"
        transform="rotate(-32 51.25 51)"/>

  <!-- Middle stump — wobbling left -->
  <rect x="58" y="33" width="4.5" height="30" rx="1.2" fill="#c8a84b"
        transform="rotate(-8 60.25 48)"/>

  <!-- Right stump — upright -->
  <rect x="67" y="34" width="4.5" height="30" rx="1.2" fill="#c8a84b"/>

  <!-- Bail 1 — flying off left stump -->
  <rect x="42" y="30" width="9" height="2.2" rx="1" fill="#c8a84b"
        transform="rotate(-38 46.5 31.1)"/>

  <!-- Bail 2 — flying off middle stump -->
  <rect x="56" y="27" width="8" height="2" rx="1" fill="#c8a84b"
        transform="rotate(-18 60 28)"/>

  <!-- Cricket ball -->
  <circle cx="36" cy="54" r="11.5" fill="#7a1515"/>
  <!-- Ball sheen -->
  <circle cx="33" cy="51" r="4" fill="#9a1f1f" opacity="0.5"/>
  <!-- Seam arcs -->
  <path d="M 27 51 Q 36 44.5 45 51" fill="none" stroke="white" stroke-width="1.3" opacity="0.85" stroke-linecap="round"/>
  <path d="M 27 57 Q 36 63.5 45 57" fill="none" stroke="white" stroke-width="1.3" opacity="0.85" stroke-linecap="round"/>
  <!-- Seam center line -->
  <line x1="36" y1="42.5" x2="36" y2="65.5" stroke="white" stroke-width="0.7" opacity="0.35"/>
</svg>
